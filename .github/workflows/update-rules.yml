name: Update Rules

on:
  workflow_dispatch:
  schedule:
    - cron: "23 19 * * *"

permissions:
  contents: write

jobs:
  update-rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - run: python scripts/update_rules.py
      - run: python scripts/build.py
      - run: python tests/validate_module.py
      - name: Commit generated rules
        run: |
          if git diff --quiet; then
            echo "No rule changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add rules/generated modules/policy.module reports/sources.md
          git commit -m "Update generated rules"
          git push
