#!MANAGED-CONFIG https://raw.githubusercontent.com/hainingshen/shadowrocket-policy-module/main/examples/example.conf interval=86400 strict=false

[General]
bypass-system = true
skip-proxy = 127.0.0.1, localhost, *.local, captive.apple.com
dns-server = system, 223.5.5.5, 119.29.29.29, 8.8.8.8, 1.1.1.1
ipv6 = false

[Proxy]
# Replace these placeholders with your own nodes or subscription output.
Node-General = ss, example.com, 8388, encrypt-method=aes-128-gcm, password=password
Node-YouTube = ss, example.com, 8388, encrypt-method=aes-128-gcm, password=password
Node-Netflix = ss, example.com, 8388, encrypt-method=aes-128-gcm, password=password

[Proxy Group]
General = select, Node-General, Node-YouTube, Node-Netflix, DIRECT
YouTube = select, Node-YouTube, Node-General, DIRECT
Netflix = select, Node-Netflix, Node-General, DIRECT

[Rule]
# Paste modules/policy.module rules here if you want a standalone config.
# If you load the module separately, keep this section minimal.
FINAL,General
